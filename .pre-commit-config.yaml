---
# Hooks locaux. Appellent les mêmes gates que `just ci` et la CI — une seule
# définition (le Justfile), trois déclencheurs. Installer avec `pre-commit install`.
repos:
  - repo: local
    hooks:
      - id: alejandra
        name: alejandra
        language: system
        entry: alejandra --check
        files: \.nix$
        pass_filenames: true
      - id: deadnix
        name: deadnix
        language: system
        entry: deadnix --fail
        files: \.nix$
        pass_filenames: true
      - id: qmlformat
        name: qmlformat
        language: system
        entry: just fmt-check
        files: \.qml$
        pass_filenames: false
      - id: qmllint
        name: qmllint
        language: system
        entry: just lint
        files: \.qml$
        pass_filenames: false
